<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00cc33"/>
    </linearGradient>
  </defs>

  <!-- Background hexagon -->
  <polygon
    points="32,2 58,17 58,47 32,62 6,47 6,17"
    fill="#0a0a0f"
    stroke="#00ff41"
    stroke-width="1.5"
    opacity="0.9"
  />

  <!-- Inner hexagon -->
  <polygon
    points="32,8 52,20 52,44 32,56 12,44 12,20"
    fill="none"
    stroke="#00ff41"
    stroke-width="0.5"
    opacity="0.3"
  />

  <!-- Lock body -->
  <rect
    x="20" y="28" width="24" height="18" rx="2"
    fill="url(#lockGradient)"
    filter="url(#glow)"
  />

  <!-- Lock shackle -->
  <path
    d="M24 28 V23 A8 8 0 0 1 40 23 V28"
    fill="none"
    stroke="#00ff41"
    stroke-width="4"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Keyhole -->
  <circle cx="32" cy="35" r="3" fill="#0a0a0f"/>
  <rect x="30.5" y="35" width="3" height="6" fill="#0a0a0f"/>

  <!-- Circuit lines (decorative) -->
  <path
    d="M10 32 H16 M48 32 H54"
    stroke="#00ff41"
    stroke-width="1"
    opacity="0.5"
  />
  <path
    d="M32 10 V14 M32 50 V54"
    stroke="#00ff41"
    stroke-width="1"
    opacity="0.5"
  />

  <!-- Corner dots -->
  <circle cx="10" cy="32" r="1.5" fill="#00ff41" opacity="0.7"/>
  <circle cx="54" cy="32" r="1.5" fill="#00ff41" opacity="0.7"/>
  <circle cx="32" cy="10" r="1.5" fill="#00ff41" opacity="0.7"/>
  <circle cx="32" cy="54" r="1.5" fill="#00ff41" opacity="0.7"/>
</svg>
